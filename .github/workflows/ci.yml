name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (compile check)
        run: python -m py_compile $(find src -name "*.py")
      - name: Run tests with coverage
        run: |
          pytest --cov=memlineage --cov-report=xml --cov-report=term -q
      - name: SAST (bandit -> SARIF)
        run: |
          bandit -r src/memlineage -f json -o bandit.json
          python scripts/bandit2sarif.py bandit.json bandit.sarif
      - name: Upload SARIF to GitHub Code Scanning
        if: matrix.python-version == '3.12'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit
      - name: SonarCloud Scan
        if: matrix.python-version == '3.12' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
